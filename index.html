<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NN Tab</title>
    <link rel="icon" type="image/png" href="tab.png">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/variables.css">
    <link rel="stylesheet" href="css/base.css">
    <link rel="stylesheet" href="css/layout.css">
    <link rel="stylesheet" href="css/components.css">
</head>
<body>
    <main class="dashboard-container">
        <!-- Left Column (35%) -->
        <aside class="left-column">
            <section id="clock-widget" class="widget">
                <h1 id="time-display">--:--</h1>
                <p id="date-display">---</p>
            </section>

            <section id="quote-widget" class="widget glass-card">
                <p class="quote-text" id="quote-text">"Always do what you are afraid to do."</p>
                <p class="quote-author" id="quote-author">— Ralph Waldo Emerson</p>
            </section>

            <section id="todo-widget" class="widget glass-card flex-grow mt-sm">
                <h3 class="font-h3 mb-md">Todo:</h3>
                <ul id="todo-list" class="todo-list">
                    <!-- Todo items injected by JS -->
                </ul>
                <div class="mt-md" style="margin-top: var(--space-md)">
                    <button id="add-todo-btn" class="pill-btn primary-btn">(+) Add Note</button>
                </div>
            </section>
        </aside>

        <!-- Right Column (65%) -->
        <section class="right-column">
            <!-- Tabs -->
            <nav id="tabs-container" class="tabs-nav hide-scrollbar">
                <!-- Tabs injected by JS -->
            </nav>

            <!-- Shortcuts Grid -->
            <div id="shortcuts-grid" class="shortcuts-grid">
                <!-- Shortcut items injected by JS -->
            </div>
        </section>

        <!-- Floating AI Button -->
        <button id="ai-btn" class="floating-action-btn">
            <img src="https://t1.gstatic.com/faviconV2?client=SOCIAL&type=FAVICON&fallback_opts=TYPE,SIZE,URL&url=https://chatgpt.com&size=128" alt="ChatGPT" class="ai-btn-icon">
        </button>
    </main>

    <!-- Bookmark Modal -->
    <div id="bookmark-modal" class="modal-overlay hidden">
        <div class="glass-card modal-content">
            <h3 id="modal-title" class="font-h3 mb-md" style="text-align: center;">Add Bookmark</h3>
            
            <div class="modal-icon-preview">
                <div id="modal-icon-container" class="shortcut-icon-container modal-icon-box">
                    <img id="modal-icon-img" src="" style="display: none;">
                    <span id="modal-icon-spinner" class="material-symbols-outlined" style="animation: spin 1s linear infinite; display: none;">sync</span>
                    <span id="modal-icon-placeholder" class="material-symbols-outlined icon-placeholder">public</span>
                </div>
                <button id="bm-change-icon" class="tab-btn accent-btn hidden">Next Icon</button>
            </div>

            <div class="modal-body">
                <input type="text" id="bm-name" placeholder="Name (e.g. YouTube)" class="input-field">
                <input type="url" id="bm-url" placeholder="URL (e.g. https://youtube.com)" class="input-field">
                <select id="bm-category" class="input-field mt-sm">
                    <!-- Options injected by JS -->
                </select>
            </div>
            <div class="modal-footer mt-md">
                <button id="bm-delete" class="tab-btn delete-action-btn hidden">Delete</button>
                <div style="flex: 1;"></div>
                <button id="bm-save" class="pill-btn primary-btn" style="width: auto;" disabled>Save</button>
            </div>
        </div>
    </div>

    <!-- Tab Modal -->
    <div id="tab-modal" class="modal-overlay hidden">
        <div class="glass-card modal-content">
            <h3 id="tab-modal-title" class="font-h3 mb-md">Add Category</h3>
            <div class="modal-body">
                <input type="text" id="tab-name" placeholder="Category Name" class="input-field">
            </div>
            <div class="modal-footer mt-md">
                <button id="tab-cancel" class="tab-btn">Cancel</button>
                <button id="tab-delete" class="tab-btn delete-action-btn hidden">Delete</button>
                <button id="tab-save" class="pill-btn primary-btn" style="width: auto;">Save</button>
            </div>
        </div>
    </div>

    <!-- Quote Modal -->
    <div id="quote-modal" class="modal-overlay hidden">
        <div class="glass-card modal-content">
            <h3 class="font-h3 mb-md">Edit Quote</h3>
            <div class="modal-body">
                <input type="text" id="quote-input-text" placeholder="Quote Text" class="input-field">
                <input type="text" id="quote-input-author" placeholder="Author Name" class="input-field">
            </div>
            <div class="modal-footer mt-md">
                <button id="quote-cancel" class="tab-btn">Cancel</button>
                <button id="quote-save" class="pill-btn primary-btn" style="width: auto;">Save</button>
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script type="module" src="js/main.js"></script>
</body>
</html>
